# The primary author of this blog.
# Must be the same as `author` in `_config.yml`.
# Change `author1` to your shortname.
author1:
  name: Austin Chemelli
  email: <mail@domain.tld>

  # Used at the bottom of each page and at the top of the `about` layout
  # Markdown enabled, can use multiple paragraphs (enabled by `|`)
  about: |
    I am a fourth-year Computer Science student at Georgia Tech, with a relentless passion for technology and innovation. My journey in the field has been a dynamic exploration, continually focused on curating and strengthening my versatile skillset.

  # This photo will be used in the about section
  picture:
    path: ../assets/img/pic3.jpg
    # srcset is optional, but can be used to provide higher res versions for retina displays
    srcset:
      1x: ../assets/img/pic3.jpg
      #2x: https://via.placeholder.com/256x256

  # Social media icons in sidebar
  # Comment/uncommet to show/hide
  # Rearrange to change the order in which they appear
  social:
    # twitter: <username>
    github: austin-chemelli
    email: austin.chemelli@gatech.edu
    # rss:             https://<url>/feed.xml
    # facebook:        <username>
    # google:          <number>
    # vk:              <username>
    # youtube:         <string_string_string>
    # vimeo:           <username>
    # vine:            <username>
    # spotify:         <user>/<number>
    # soundcloud:      <username>
    # lastfm:          <username>
    # instagram:       <username>
    # flickr:          <string@string>
    # 500px:           <username>
    # dribbble:        <username>
